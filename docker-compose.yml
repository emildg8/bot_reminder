services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from bot.version import __version__; print(__version__)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
